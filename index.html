<body>
  <div id="game-app">
    <div id="starter-screen">
      <div class="starter-container">
        <div class="gba-header-starter">Escolha seu Inicial</div>

        <div class="starter-selection-area">
          <div class="starter-card">
            <div class="sprite-wrapper">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png">
            </div>
            <button class="gba-btn-select" onclick="chooseStarter('Bulbasaur')">BULBASAUR</button>
          </div>

          <div class="starter-card">
            <div class="sprite-wrapper">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png">
            </div>
            <button class="gba-btn-select" onclick="chooseStarter('Charmander')">CHARMANDER</button>
          </div>

          <div class="starter-card">
            <div class="sprite-wrapper">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png">
            </div>
            <button class="gba-btn-select" onclick="chooseStarter('Squirtle')">SQUIRTLE</button>
          </div>
        </div>
      </div>
    </div>

    <div id="battle-panel" style="display:none;">
      <div class="header-row">
        <button class="nav-btn" onclick="changeRoute(-1)">◀</button>

        <div class="route-banner">
          <div class="banner-inner">
            <strong id="current-map">ROTA 01</strong>
            <span class="route-subtext">
              DERROTADOS: <span id="route-kill-count" class="route-kill-value">0</span>
            </span>
          </div>
        </div>

        <button class="nav-btn" onclick="changeRoute(1)">▶</button>
        <button id="pokes-btn" onclick="openRoutedex()">Pokes</button>
      </div>

      <div class="battle-wrapper">
        <div class="enemy-battle-box">
          <div id="enemy-name"></div>
          <div id="enemy-img-container" class="enemy-sprite-container"></div>

          <div class="enemy-hp-container">
            <div class="hp-bar-outer">
              <div id="enemy-hp-bar" class="hp-bar-inner"></div>
            </div>

            <div class="enemy-hp-text">
              HP: <span id="hp-current">0</span> / <span id="hp-max">0</span>
            </div>
          </div>
        </div>

        <div id="reward-area"></div>
      </div>
    </div>

    <div id="side-panels" style="display:none;">
      <div class="panel menu-panel">
        <div class="gba-header">MENU</div>

        <div class="menu-grid">
          <button class="menu-item" onclick="openPokedex()">
            <div class="menu-icon-wrap">
              <img src="https://raw.githubusercontent.com/dbzkakarotobr/pokeidlebr/main/assets/icons/icon-pokedex.png" class="menu-icon menu-icon-pokedex" alt="Pokedex">
            </div>
            <span class="menu-label">Pokedex</span>
          </button>
          
          <button class="menu-item" onclick="openBagModal()">
            <div class="menu-icon-wrap">
              <img src="https://raw.githubusercontent.com/dbzkakarotobr/pokeidlebr/main/assets/icons/icon-mochila.png" class="menu-icon" alt="Mochila">
            </div>
            <span class="menu-label">Mochila</span>
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="gba-header">MEU STATUS</div>

        <div class="status-row">
          <img id="gold-icon" class="icon-hud">
          <span>GOLD:</span>
          <span id="gold-count">0</span>
        </div>

        <div class="status-row">
          <img id="dps-icon" class="icon-hud">
          <span>DPS TOTAL:</span>
          <span id="total-atk">0</span>
        </div>

        <div class="status-row">
          <img id="pokemon-icon" class="icon-hud">
          <span>POKEMONS:</span>
          <span id="pokemon-count">0</span>
        </div>
      </div>

      <div class="panel team-panel">
        <div class="gba-header">MEU TIME</div>

        <div class="team-header">
          <span></span>
          <span style="cursor:pointer" onclick="sortTeam('name')">NOME</span>
          <span style="cursor:pointer" onclick="sortTeam('lvl')">LVL</span>
          <span style="cursor:pointer" onclick="sortTeam('dps')">DPS</span>
        </div>

        <div id="pokemon-list" class="team-list"></div>
      </div>
    </div>

    <div id="routedex-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="gba-header" id="routedex-title">Pokemons:</div>
        <div id="routedex-list" class="routedex-grid"></div>
        <button class="gba-btn-select" style="margin-top:20px;" onclick="closeRoutedex()">FECHAR</button>
      </div>
    </div>

    <div id="bag-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="gba-header bag-header">
          <img src="https://raw.githubusercontent.com/dbzkakarotobr/pokeidlebr/main/assets/icons/icon-mochila.png" class="header-icon">
          <span>MOCHILA</span>
        </div>
        <div id="bag-items-list" class="bag-grid"></div>
        <button class="gba-btn-select" style="margin-top:20px;" onclick="closeBagModal()">FECHAR</button>
      </div>
    </div>
    
    <div id="pokedex-modal" class="modal-overlay">
      <div class="modal-content pokedex-modal-content">
        <div class="gba-header pokedex-header">
          <img src="https://raw.githubusercontent.com/dbzkakarotobr/pokeidlebr/main/assets/icons/icon-pokedex.png" class="header-icon header-icon-pokedex">
          <span>POKEDEX</span>
        </div>

        <div class="pokedex-topbar">
          <span id="pokedex-count">0 / 151</span>
        </div>

        <div id="pokedex-list" class="pokedex-grid"></div>

        <button class="gba-btn-select" style="margin-top:20px;" onclick="closePokedex()">FECHAR</button>
      </div>
    </div>
  </div>
</body>
